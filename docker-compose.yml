services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: numo_backend
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      FLASK_APP: app.main
      FLASK_ENV: ${FLASK_ENV:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DATABASE_URL: sqlite:////app/data/numo.db
      NUMO_VERSION: ${NUMO_VERSION:-0.1.0}
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    networks:
      - numo_network
    restart: unless-stopped

networks:
  numo_network:
    driver: bridge
